# Dev only: hot reload via volume mounts. Stage/prod compose later.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamification-core-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-gamification}:${POSTGRES_PASSWORD:-gamification_dev}@postgres:5432/${POSTGRES_DB:-gamification_core}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Mount app code so changes reflect without rebuild
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: gamification-core-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gamification}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamification_dev}
      POSTGRES_DB: ${POSTGRES_DB:-gamification_core}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gamification} -d ${POSTGRES_DB:-gamification_core}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gamification-core-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    restart: unless-stopped

volumes:
  postgres_data_dev:
  redis_data_dev:
